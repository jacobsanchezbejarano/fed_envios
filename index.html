<!DOCTYPE html>
<html>
<head>
    <title>Order Form</title>
    <!-- Include Leaflet CSS and JavaScript -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles/base.css">
</head>
<body>
    <h1>Lista de Pedidos</h1>
    <div class="container">
        <h2>Formulario de Pedido</h2>
        <form id="pedidoForm">
          <!-- <div class="form-group">
            <label for="pedido_id">ID del Pedido:</label>
            <input type="text" id="pedido_id" name="pedido_id" value="" required>
          </div> -->
          <div id="map"></div> <!-- Contenedor del mapa -->

          <div class="form-group">
            <input type="hidden" id="pedido_latitud" name="pedido_latitud" value="" required>
          </div>
          <div class="form-group">
            <input type="hidden" id="pedido_longitud" name="pedido_longitud" value="" required>
          </div>
          <!-- <div class="form-group">
            <label for="pedido_pais">País:</label>
            <input type="text" id="pedido_pais" name="pedido_pais" value="" required>
          </div>
          <div class="form-group">
            <label for="pedido_ciudad">Ciudad:</label>
            <input type="text" id="pedido_ciudad" name="pedido_ciudad" value="" required>
          </div> -->
          <div class="form-group">
            <label for="pedido_celular">Celular:</label>
            <input type="text" id="pedido_celular" name="pedido_celular" value="" required>
          </div>
          <div class="form-group">
            <label for="pedido_nombre">Nombre:</label>
            <input type="text" id="pedido_nombre" name="pedido_nombre" value="">
          </div>
          <div class="form-group">
            <label for="pedido_cantidad">Cantidad:</label>
            <input type="text" id="pedido_cantidad" name="pedido_cantidad" value="">
          </div>
          <div class="form-group">
            <label for="pedido_estado">Estado del Pedido:</label>
            <select id="pedido_estado" name="pedido_estado">
              <option value="">SELECCIONAR</option>
              <option value="ENCARGADO">ENCARGADO</option>
              <option value="PAGADO">PAGADO</option>
            </select>
          </div>
          <div class="form-group">
            <label for="pedido_tipo">Tipo de Pedido:</label>
            <select id="pedido_tipo" name="pedido_tipo">
              <option value="">SELECCIONAR</option>
              <option value="DELIVERY">DELIVERY</option>
              <option value="EN LUGAR">EN LUGAR</option>
            </select>
          </div>
          <div class="form-group">
            <label for="pedido_hora_entrega">Hora de Entrega:</label>
            <input type="text" id="pedido_hora_entrega" name="pedido_hora_entrega" value="">
          </div>
          <div class="form-group">
            <label for="pedido_zona">Zona:</label>
            <input type="text" id="pedido_zona" name="pedido_zona" value="">
          </div>
          <div class="form-group">
            <label for="pedido_comentarios">Comentarios:</label>
            <input type="text" id="pedido_comentarios" name="pedido_comentarios" value="">
          </div>
          <div class="form-group">
            <label for="pedido_vendedor">Vendedor:</label>
            <select id="pedido_vendedor" name="pedido_vendedor">
                <option value="">SELECCIONAR</option>
                <option value="Jacob">Jacob</option>
                <option value="Gaby">Gaby</option>
                <option value="Angelica">Angelica</option>
                <option value="Milena">Milena</option>
                <option value="Carolina Vaca">Carolina Vaca</option>
                <option value="Roxana Suarez">Roxana Suarez</option>
                <option value="Yanine">Yanine</option>
                <option value="Yanine">Daniel Justiniano</option>
            </select>
          </div>
    
          <button type="button" onclick="enviarPedido(event)">Enviar Pedido</button>
        </form>
      </div>


    <script src="scripts/api_pedidos.js"></script>
    <script>
      // Coordenadas por defecto (Santa Cruz de la Sierra)
      var defaultLat = -17.7834;
      var defaultLng = -63.1821;
      
      // Crear mapa centrado en las coordenadas por defecto
      var map = L.map('map').setView([defaultLat, defaultLng], 13);
      
      // Agregar capa de mapa base de OpenStreetMap
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
      }).addTo(map);
      
      // Marcar la ubicación en el mapa
      var marker = L.marker([defaultLat, defaultLng], { draggable: true }).addTo(map)
          .bindPopup('Ubicación del pedido')
          .openPopup();
  
      // Función para actualizar las coordenadas cuando el marcador se mueve
      function updateMarker(lat, lng) {
          marker.setLatLng([lat, lng]);
          document.getElementById('pedido_latitud').value = lat;
          document.getElementById('pedido_longitud').value = lng;
      }
  
      // Manejador de eventos cuando el marcador se mueve
      marker.on('dragend', function(event){
          var marker = event.target;
          var position = marker.getLatLng();
          var lat = position.lat;
          var lng = position.lng;
          updateMarker(lat, lng);
      });

      map.on('click', function(e) {
          if (marker) {
              // If a marker already exists, remove it
              map.removeLayer(marker);
          }

          // Create a marker at the clicked location
          marker = L.marker(e.latlng).addTo(map);


          // Update the latitude and longitude input fields
          document.getElementById('pedido_latitud').value = e.latlng.lat;
          document.getElementById('pedido_longitud').value = e.latlng.lng;
      });

  </script>
  
</body>
</html>
